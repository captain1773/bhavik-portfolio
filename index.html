        const { useState, useEffect, useRef } = React;

        const ParticleCanvas = () => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let animationFrameId;

                let width = canvas.width = window.innerWidth;
                let height = canvas.height = window.innerHeight;

                const handleResize = () => {
                    if (!canvas) return;
                    width = canvas.width = window.innerWidth;
                    height = canvas.height = window.innerHeight;
                };

                window.addEventListener('resize', handleResize);

                // Premium cinematic floating dust/light particles
                const particleCount = Math.min(Math.floor(window.innerWidth / 22), 60);
                const particles = [];

                for (let i = 0; i < particleCount; i++) {
                    const isGold = Math.random() > 0.35;
                    particles.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        radius: Math.random() * 1.5 + 0.5,
                        color: isGold ? '226, 182, 70' : '255, 248, 230',
                        baseAlpha: Math.random() * 0.22 + 0.08,
                        alpha: Math.random() * 0.22 + 0.08,
                        vx: (Math.random() - 0.5) * 0.18,
                        vy: -(Math.random() * 0.3 + 0.08),
                        pulseSpeed: Math.random() * 0.015 + 0.004,
                        angle: Math.random() * Math.PI * 2
                    });
                }

                const render = () => {
                    ctx.clearRect(0, 0, width, height);

                    particles.forEach(p => {
                        p.x += p.vx + Math.sin(p.angle) * 0.12;
                        p.y += p.vy;
                        p.angle += p.pulseSpeed;
                        
                        // Subtle slow fade pulsation (cinematic dust effect)
                        p.alpha = p.baseAlpha + Math.sin(p.angle) * 0.1;
                        const currentAlpha = Math.max(0.03, Math.min(0.35, p.alpha));

                        // Wrap around edges smoothly
                        if (p.y < -10) {
                            p.y = height + 10;
                            p.x = Math.random() * width;
                        }
                        if (p.x < -10) p.x = width + 10;
                        if (p.x > width + 10) p.x = -10;

                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${p.color}, ${currentAlpha})`;
                        
                        // Soft glow aura
                        ctx.shadowBlur = p.radius * 4;
                        ctx.shadowColor = `rgba(${p.color}, ${currentAlpha * 0.8})`;
                        ctx.fill();
                    });

                    animationFrameId = requestAnimationFrame(render);
                };

                render();

                return () => {
                    window.removeEventListener('resize', handleResize);
                    cancelAnimationFrame(animationFrameId);
                };
            }, []);

            return (
                <canvas 
                    ref={canvasRef} 
                    className="fixed inset-0 w-full h-full pointer-events-none z-[1]"
                />
            );
        };
